[build]
builder = "NIXPACKS"
buildCommand = "pip install -r requirements.txt"

[deploy]
startCommand = "OPENSSL_CONF=./openssl.cnf uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2"
healthcheckPath = "/api/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[env]
# These are defaults — override in Railway dashboard with real values
PYTHONUNBUFFERED = "1"
DEV_MODE = "false"
